# The URL the site will be built for
base_url = "https://jamesguthrie.ch"

theme = "simple-dev-blog"

taxonomies = [ { name = "tags" } ]

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown.highlighting]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
error_on_missing_language = false
style = "inline"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
# Put all your custom variables here

analytics = """
<script defer data-domain="jamesguthrie.ch" src="https://plausible.io/js/script.js"></script>
"""

dark_mode = true

katex = true

nav = [
    { name = "Blog", path = "/blog/" },
    { name = "Contact", path = "/contact/" },
    { name = "TIL", path = "/til/" }
]

icon = "icon.jpg"
profile_small = "icon.jpg"

author = "James Guthrie"

footer_about = """
"""

footer_page = """
© James Guthrie, all rights reserved
"""

not_found_message = """
This is not the page you're looking for... return back to [safety?](/)
"""

